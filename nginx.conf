# nginx config for omayoglu.com — static SPA-adjacent site.
# Runs behind Cloudflare Tunnel, so no TLS here; CF handles edge TLS.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers consistent with prompt-shield's posture.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: allow Google Fonts (inline styles inlined by the browser),
    # no scripts other than the tiny inline one that sets the current year.
    add_header Content-Security-Policy
        "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'none'"
        always;

    # Long cache for immutable-ish static assets; short for the index
    # so deploys reflect immediately on refresh.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location ~* \.(css|svg|ico|woff2?|jpg|jpeg|png|gif)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Gzip for text content.
    gzip on;
    gzip_types text/css text/plain application/javascript image/svg+xml;
    gzip_min_length 256;

    # SPA-less fallback: everything resolves to the single index.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health probe for the container.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
