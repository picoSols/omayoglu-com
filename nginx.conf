# Short cache on HTML (so deploys are visible on next refresh), longer
# on static assets. The client bumps ?v=... on script src when they
# change to sidestep Cloudflare's 4-hour edge cache.
#
# TLS is terminated at Cloudflare edge; this origin only serves over
# the CF tunnel. Security headers are set here so they reach the
# browser regardless of CF config: HSTS tells compliant browsers to
# never hit HTTP again; the others are standard hardening.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;

    location = /index.html {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "DENY" always;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location ~* \.(js|css|svg|woff2?)$ {
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "DENY" always;
        add_header Cache-Control "public, max-age=3600";
    }
    location = /.well-known/mta-sts.txt {
        default_type text/plain;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "DENY" always;
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
