# Short cache on HTML (so deploys are visible on next refresh), longer
# on static assets. The client bumps ?v=... on script src when they
# change to sidestep Cloudflare's 4-hour edge cache.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location ~* \.(js|css|svg|woff2?)$ {
        add_header Cache-Control "public, max-age=3600";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
